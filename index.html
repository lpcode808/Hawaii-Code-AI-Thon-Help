<script type="text/markdown" id="doc-facilitator-guide">
# Hawaii Code AI-Thon: Build Your First Web App with AI

**Audience**: Students and teachers with zero coding background
**Tool**: Google Gemini via AI Studio (free, no API key)
**Output**: A working single-file web app, shared via Google Sites or GitHub Pages
**Time**: Half-day event (~3.5 hours)
**Origin**: Based on "Vibe Coding in the Classroom" presented at KS EdTech (June 2025) — [bit.ly/LP0603](https://bit.ly/LP0603)

---

## Core Philosophy

> "Build first, understand later."

Participants don't need to learn HTML, CSS, or JavaScript first. They are **project managers**. The AI is the developer. Their job is to describe what they want, test the result, and direct changes.

The process: **Research → Generate → Tweak → Deploy**

---

## Event Agenda

| Phase | What | Who leads | Time | Handout |
|-------|------|-----------|------|---------|
| **0. Setup** | Open Google Doc, set up tracking | Facilitator guides | 10 min | Quick Start (Step 0) |
| **1. Research** | Frame the problem — what will you build? | Facilitator, then pairs | 20 min | This guide (Step 1) |
| **2. Generate** | Paste super prompt, describe app, get code | Individual | 20 min | The Super Prompt |
| **3. Tweak** | Save as HTML, open in browser, iterate, understand | Individual | 60 min | Quick Start + Understand Your Code |
| **4. Deploy** | Put on Google Sites or GitHub Pages | Individual | 20 min | Deploy Guide |
| **5. Share** | Demo your app to the group | Whole group | 30 min | — |
| **Buffer** | Help desk, Q&A, overflow | Facilitator | 30 min | — |

---

## Facilitator Setup (Do This Before the Event)

### Accounts Participants Need
- **Google account** (personal, not school/work — fewer restrictions for AI Studio)
- **GitHub account** (optional, only if doing GitHub Pages deployment)

### What to Prepare

**1. Create a shared Google Drive folder**
   - Name it `[Event Name] Hackathon — [Date]`
   - Share it with "Anyone with the link can edit"
   - Put the event link in this folder and display it on screen
   - Participants will create their Google Docs inside this folder

**2. Share the hackathon materials**
   - Share a link to this HTML file (or export to PDF)
   - OR: copy the Super Prompt text into a shared Google Doc for easy access

**3. Test the flow yourself first**
   - Go through Quick Start from scratch
   - Build the conference contact tracker example (it's in the Super Prompt guide)
   - Confirm it works in your browser
   - Takes 10–15 minutes

**4. Have a backup app idea ready**
   - If someone's stuck, suggest: "Make a simple contact tracker — name, note, timestamp, copy to clipboard"
   - This is the demo from the original KSEdTech presentation and is proven to work

### Day-Of Checklist
- [ ] WiFi works and blocks neither aistudio.google.com nor github.com
- [ ] Shared Google Drive folder is created and link is visible to participants
- [ ] You have the super prompt ready to paste (on screen or in a shared Doc)
- [ ] You've confirmed AI Studio works on the venue WiFi
- [ ] Display/screen shows the event folder link or QR code

---

## Step 1: Research — Frame the Problem (20 min, Facilitator-Led)

The goal: every participant leaves this section with a specific, scoped app idea written in their Google Doc.

### Opening Exercise (5 min)

Say: *"Before we touch the AI, let's think about what we want to build. The best apps solve a real problem someone actually has. Think about your daily life — as a teacher, a student, a person."*

Prompt questions:
- What do you do manually that a simple tool could automate?
- What do you wish you could calculate, track, or organize?
- What would help your students, your classroom, or your workflow?

### App Categories to Spark Ideas

| Category | Ideas |
|----------|-------|
| **Calculate** | Tip splitter, unit converter, grade calculator, loan estimator |
| **Track** | Habit streak, water intake, meeting notes, contact log |
| **Organize** | To-do list, packing checklist, student roster, schedule |
| **Time** | Pomodoro timer, countdown to event, stopwatch |
| **Classroom** | Random name picker, exit ticket form, quiz flashcards |
| **Fun** | Decision spinner, compliment generator, trivia game |

### Scope Check (5 min)

Have each participant write in their Google Doc:
1. **"I need a way to ___ so that ___."** (plain English problem statement)
2. **3 core features** — no more than 3 for v1

Circulate and help anyone whose idea is too vague or too big. Common fixes:
- "A social media platform" → "A simple mood log that saves 5 words per day"
- "A full school management system" → "A random name picker for my class roster"
- "An AI chatbot" → "A flashcard quiz app with 10 fixed questions"

### PRD Shortcut (optional, if participants want structure)

If anyone is unsure of their scope, have them describe their idea to Gemini and ask:
> "Write a Product Requirements Document (PRD) for this app that could be given to a developer to build in a single HTML file. Keep it to 3–5 bullet points."

The PRD output helps them write a better prompt in Phase 2.

---

## Step 2: Generate (20 min)

Direct participants to the Super Prompt guide for exact steps. Key facilitation notes:

- **Walk through the first 2 minutes together** — show the AI Studio interface on screen, paste the prompt live
- **Model the conference contact tracker** as a group first, then let participants do their own
- **Remind about the save button** in AI Studio (looks like a floppy disk) — it doesn't auto-save
- **It's okay if the first result isn't perfect** — that's Phase 3

---

## Step 3: Tweak (60 min)

This is the core learning loop. Participants will:
1. Save the code as `index.html`
2. Open it in their browser
3. Use the follow-up prompts from "Understand Your Code" to learn what they built
4. Find what's wrong or missing
5. Go back to Gemini and ask for specific improvements
6. Repeat

### Understanding the Code (teachers and students together)

The "Understand Your Code" guide has 3 follow-up prompts participants paste into Gemini:
1. **"What Did I Build?"** — a visual overview, no code knowledge needed
2. **"Walk Me Through the Code"** — guided tour with 5 safe experiments to try
3. **"Help Me Fix or Change This"** — a patient tutor that explains, not just fixes

**For teachers**: Use Prompt 2 on a student's code to learn alongside them. The safe experiments ("change this color," "change this number") work great as a group activity.

### Saving the File (biggest friction point)

Walk through this live before letting participants try on their own. Common issues:
- **Mac TextEdit**: Must do Format > Make Plain Text FIRST, or the file gets corrupted
- **Windows Notepad**: Must choose "All Files" in the Save dialog, not "Text Document"
- **VS Code**: Easiest — just paste and Ctrl+S. Recommend installing VS Code before the event.

### Teaching the Iteration Loop

After the first test, ask participants: *"What's one thing that doesn't work the way you wanted?"*

That frustration → write it as a prompt → send it → update the file → test again.

Key prompting rules to share:
- **One change at a time** — don't ask for 10 things at once
- **Paste your current code** when asking for changes — Gemini forgets the previous version
- **Be specific** — "make it bigger and red" not "make it look better"

---

## Step 4: Deploy (20 min)

Direct participants to the Deploy Guide. Two paths:

**Option A — Google Sites** (recommended for most participants)
- No new accounts needed
- Embedded HTML works for most apps
- URL: `sites.google.com/view/your-site-name`
- Done in 5 minutes

**Option B — GitHub Pages** (for participants who want a more robust URL)
- Requires a GitHub account (5 minutes to create)
- Works with all app features
- URL: `username.github.io/repo-name`
- Done in 10–15 minutes

After deploying, participants paste their URL into their Google Doc.

---

## Step 5: Show and Tell (30 min)

Each participant (or pair) does a 2-minute demo:
1. What problem did you solve?
2. Show the app working
3. What would you add if you had another hour?

Facilitator notes:
- Celebrate working-but-imperfect apps — this is v1, not a finished product
- Note the variety of problems people chose to solve
- Discuss: "What surprised you about working with AI this way?"

2. Click **+ Blank** to create a new document
3. Name it: `Hackathon — [Your Name] — [Date]`
4. Share it with the facilitator (File > Share > enter their email)
5. Copy and paste this template into your doc:

## Final Code
(paste your final index.html code here)

## My App Link
(paste your Google Sites or GitHub Pages URL here)

## Reflection
What I built:
What surprised me:
What I'd add next:
```

---

## Phase 1: Research — Define What You'll Build (10 min)

Before touching AI, write down your idea in your Google Doc.

**Fill in this sentence:**
> "I need a way to _______________ so that _______________."

**Example:**
> "I need a way to **track the people I meet at conferences** so that **I remember who to follow up with and what we talked about**."

**Then list 3 core features — keep it simple:**
1. Input fields: name, note, follow-up action
2. Save each entry with a timestamp
3. Copy all entries to clipboard

> Rule: If you can't write it down in plain English in 2 minutes, the idea is too vague. Narrow it down first.

---

## Phase 2: Generate — Use AI to Build It (15 min)

### 2a. Open Google AI Studio

1. Go to **[aistudio.google.com](https://aistudio.google.com/)**
2. Sign in with your **personal** Google account (not school/work — fewer restrictions)
3. In the top-left, click **"Create new prompt"**

> If you see a popup about settings or model selection, dismiss it — the defaults are fine.

### 2b. Paste the Super Prompt

1. Go to the **Super Prompt** page in this guide
2. Copy the entire text in the code block (from `VIBE CODING ASSISTANT` to `What app would you like to build today?`)
3. Click into the message box at the bottom of AI Studio
4. Paste it (Ctrl+V on Windows / Cmd+V on Mac)

> **Important**: Click the save icon (floppy disk symbol) in the top bar after pasting. AI Studio doesn't always auto-save.

### 2c. Describe Your App

In the same message box (or in a new message), type your app description. Example:

> Conference app to track people I meet. Simple text inputs for name, note, and follow-up action. Add a timestamp automatically. At the end, let me copy everything to clipboard.

Then click **Send** (or press Enter).

### 2d. Wait and Watch

Gemini will show "Thinking..." and then start generating code. This takes 30–90 seconds. You'll see the reasoning steps — this is Gemini planning before it codes.

When it's done, you'll see a big block of code starting with `<!DOCTYPE html>`.

**Paste your prompt into your Google Doc under "Attempt 1 — Prompt."**

---

## Phase 3: Tweak — Save and Test Your App (10 min)

### 3a. Copy the Code

1. Scroll through Gemini's response to find the code block
2. Select all the code — from `<!DOCTYPE html>` all the way to `</html>` at the bottom
3. Copy it (Ctrl+A won't work; you need to click at the start, Shift+click at the end, then Ctrl+C)

> Tip: Look for a "Copy" button on the code block — Gemini sometimes shows one in the top-right corner of the code.

### 3b. Save It as an HTML File

**On Mac:**
1. Open **TextEdit** (search for it in Spotlight: Cmd+Space, type "TextEdit")
2. Go to **Format > Make Plain Text** (this is critical — skip this and it won't work)
3. Paste your code (Cmd+V)
4. Go to **File > Save**
5. Name it `index.html`
6. In the save dialog, change **"If no extension is provided, use .txt"** to **"Don't append"** — or just manually type `.html` at the end
7. Save to your Desktop

**On Windows:**
1. Open **Notepad** (search in Start menu)
2. Paste your code (Ctrl+V)
3. Go to **File > Save As**
4. In the "Save as type" dropdown, choose **"All Files (*.*)"**
5. Name it `index.html`
6. Save to your Desktop

**Better option (either platform):** Use **VS Code** (free, download at code.visualstudio.com)
1. Open VS Code
2. New file: Ctrl+N (Windows) / Cmd+N (Mac)
3. Paste your code
4. Save as: Ctrl+S / Cmd+S, name it `index.html`

### 3c. Open and Test It

1. Find `index.html` on your Desktop
2. Double-click it — it opens in your browser
3. Try every feature
4. Write notes in your Google Doc: what works, what doesn't, what's missing

---

## Phase 3b: Understand — What Did You Actually Build? (optional but valuable)

Before iterating, take 5 minutes to understand what Gemini made for you. Go to **Understand Your Code** in this guide and use the follow-up prompts:

1. **Prompt 1: "What Did I Build?"** — Paste your code into a new Gemini chat with this prompt. You'll get back a visual overview of how your app works — no coding knowledge needed. Great for your Google Doc.

2. **Prompt 2: "Walk Me Through the Code"** — This gives you 5 safe experiments: things you can change in the code (a color, a number, a message) to see what happens. Try at least one before moving on.

3. **Prompt 3: "Help Me Fix or Change This"** — Use this during iteration when you have a specific problem or want to add something.

**Teachers**: Try Prompt 2 on your own or alongside a student. The experiments build your comfort with reading code without needing to write any.

Paste Gemini's explanation into your Google Doc under "What I Learned About My Code."

---

## Phase 4: Iterate — Make It Better (repeat as needed)

The first version is never perfect. That's expected. The goal is to go around this loop:

```
Write prompt → Generate → Test → Understand → Find problem → Improve prompt → Repeat
```

### How to Ask for Improvements

Go back to AI Studio and ask Gemini to fix or add things. **Be specific. Change one thing at a time.**

**To fix a bug:**
> The "add entry" button doesn't do anything when I click it. Fix just this issue. Here's my current code: [paste your code]

**To add a feature:**
> Here's my current code: [paste]. Add a character counter under the notes field showing how many characters are left (max 200). Don't change anything else.

**To change the design:**
> Make the background dark gray (#1a1a1a) and the text white. Keep the buttons green. Don't change the functionality.

**To understand something:**
> In simple terms, what does the JavaScript function at line [X] do?

### Save Each Iteration

After each new version of the code:
1. Copy the new code from Gemini
2. In your text editor, **select all** (Ctrl+A / Cmd+A) and **paste** to replace the old code
3. Save the file (Ctrl+S / Cmd+S)
4. **Refresh your browser** (F5 or Ctrl+R / Cmd+R) — you don't need to close and reopen
5. Paste the prompt into your Google Doc under the next "Attempt" section

---

## Troubleshooting

### "The file opened as text, not a web page"
- Mac TextEdit: you forgot **Format > Make Plain Text**. Save again as plain text.
- Windows: you saved as `.txt`. Open File Explorer, right-click the file, Rename, change `.txt` to `.html`.
- Either: right-click the file > Open With > Chrome (or Firefox)

### "The app doesn't do anything when I click buttons"
- Copy ALL the code — scroll to the bottom of Gemini's response to make sure you got `</html>`
- Open the browser's developer console: press **F12**, click the **Console** tab, look for red errors
- Copy the red error text and paste it back to Gemini: "I'm getting this error: [paste]. Fix it."

### "Gemini stopped generating partway through"
- Scroll down and look for a "Continue" button
- Or ask: "Continue from where you left off — the code got cut off."

### "I want to start completely over"
- Start a new AI Studio chat (don't reuse the same one)
- Paste the super prompt again
- Describe the same app but differently, or try a new idea

### "I have no idea what to build"
Pick one and add your name to it — make it yours:
- **[Your name]'s tip calculator** — enter bill + people + tip %, see split
- **[Event] countdown** — days/hours/minutes until something you care about
- **Random picker** — paste a list, click to pick one randomly
- **Check-in log** — record name + note + timestamp, copy all to clipboard
- **Habit tracker** — daily checklist that saves between sessions

---

## Next Step: Deploy It

Once your app works, go to **Deploy Guide** to put it online so anyone can open it without needing your laptop.
</script>


<script type="text/markdown" id="doc-superprompt">
# The Super Prompt

This is what you paste into Google AI Studio before describing your app. It sets up Gemini to behave like an expert app-building assistant for beginners.

---

## Step 1: Go to Google AI Studio

1. Open a browser and go to: **[aistudio.google.com](https://aistudio.google.com/)**
2. Sign in with your **personal Google account** (not a school/work account if possible — fewer restrictions)
3. Click **"Create new prompt"** in the top left

> **Note**: This is different from gemini.google.com. AI Studio is more generous with usage and works better for this.

---

## Step 2: Paste This Prompt

Copy everything in the box below. Then paste it into the chat box at the bottom of the screen.

```
VIBE CODING ASSISTANT - Single File App Generator

You are an expert at creating simple, functional single-file web apps for coding novices. Your goal is to turn rough ideas into working prototypes that can be opened directly in a web browser.

CONSTRAINTS:
- Generate ONE complete HTML file containing CSS and JavaScript
- No external dependencies (libraries, APIs, or CDNs)
- Apps must work when opened locally on desktop
- Include clear, educational comments explaining key concepts
- Keep all responses under 200 words (except code generation)

CODE REQUIREMENTS:
- Use semantic HTML structure
- Include responsive CSS styling
- Add JavaScript for interactivity
- Comment major code sections and explain key functions
- Use modern but widely-supported syntax

SUGGESTED APP TYPES:
- Productivity tools (timers, calculators, note-takers)
- Simple games (memory, word games, puzzles)
- Utilities (unit converters, password generators)
- Trackers (habits, expenses, tasks)
- Educational tools (flashcards, quizzes)

WORKFLOW:
1. If user gives vague idea, ask 1-2 clarifying questions
2. Generate complete, commented code
3. Offer brief explanation of how data flows through the app
4. Suggest 2-3 simple modifications they could try

USER INSTRUCTION: Simply describe what kind of app you want to build, even if your idea is rough or incomplete. I'll help you create something functional!

What app would you like to build today?
```

> **Warning**: AI Studio sometimes does not auto-save. Look for a save icon in the top bar and click it after pasting the prompt.

---

## Step 3: Describe Your App

After pasting the prompt above, type your app description **in the same message box** before hitting send. Or send the prompt first, then type your description in the next message.

Keep your description short and specific. Examples:

**Conference contact tracker:**
> Conference app to track people I meet. Simple input of name, note, and follow-up — all text fields. Timestamp each entry. Copy everything to clipboard at the end.

**Habit tracker:**
> A daily habit tracker where I can add habits I want to build, check them off each day, and see how many days in a row I've done each one.

**Pomodoro timer:**
> A Pomodoro timer with 25-minute work sessions and 5-minute breaks. Start, pause, and reset buttons. Show which session I'm on. Play a sound when time's up.

**Random name picker:**
> A tool where I can paste a list of student names (one per line) and click a button to randomly pick one. Highlight the picked name. Let me remove it from the pool after picking.

**Tip calculator:**
> A tip calculator. I enter the bill total and number of people, choose 15/18/20/25% tip, and it shows the tip amount and total per person.

---

## Step 4: Wait for the Code

Gemini will:
1. Possibly ask 1-2 clarifying questions (answer them briefly)
2. Generate the full HTML code
3. Offer to explain how it works

The code generation usually takes 30–90 seconds. You'll see it "thinking" first — that's normal.

---

## Iterating (Making It Better)

After you have a working first version, ask for specific improvements. Keep each request focused:

**To fix something broken:**
> The [feature] isn't working. When I [do X], [Y happens] instead of [Z]. Fix just this issue, don't change anything else.

**To add a feature:**
> Here's my current code: [paste the code]. Add [specific feature]. Keep everything else the same.

**To change the look:**
> Change the color scheme to dark mode with a navy background and white text. Don't change any functionality.

**To understand the code:**
> Explain what the JavaScript section does in simple terms. I'm a complete beginner.

**Full reset and retry:**
> Start over. New version with these changes: [list what you want different].

---

## App Ideas by Category

If you're stuck, pick one from this list and make it your own:

| What it does | App idea |
|---|---|
| Calculate something | Tip splitter, unit converter, BMI calculator, loan payment estimator |
| Track something | Habit streak, water intake, mood log, reading list, expense log |
| Organize something | To-do list, packing checklist, meeting notes, contact tracker |
| Time something | Pomodoro timer, countdown to event, stopwatch with laps |
| Classroom tools | Random name picker, quiz flashcards, exit ticket form, seating chart randomizer |
| Fun/creative | Decision spinner, compliment generator, quote of the day, trivia game |

---

## What Makes a Good First App

- **Does one thing well** — not five things poorly
- **Solves a real problem you actually have** — you'll be more motivated to finish it
- **Has 3 features or fewer** for version 1 — you can always add more later
- **Works without an internet connection** — the super prompt enforces this

> You are the **project manager**. The AI is your developer. Your job is to describe what you want clearly, test it, and tell the AI what needs to change. You don't need to know how to code.
</script>


<script type="text/markdown" id="doc-understand">
# Understand Your Code: Follow-Up Prompts

You built an app. It works. Now what?

These are **3 follow-up prompts** you paste into the same Gemini chat (or a new one) to understand what you built. Use them in order, or jump to whichever one you need.

| Prompt | What it does | When to use it |
|--------|-------------|----------------|
| **1. "What Did I Build?"** | Visual overview — no code shown | Right after your app works |
| **2. "Walk Me Through the Code"** | Beginner-friendly code tour with safe experiments | When you want to understand how it works |
| **3. "Help Me Fix or Change This"** | Guided debugging and feature help | When something's broken or you want to add a feature |

---

## Prompt 1: "What Did I Build?" (The Big Picture)

Use this when your app is working and you want to understand what it actually does — without reading code. Paste the prompt below, then paste your `index.html` code after it.

```
I just built a web app with AI and I want to understand what it does at a HIGH LEVEL. Don't show me code — show me what happens from a user's perspective using simple diagrams.

Here's what I need:

1. THE APP IN ONE SENTENCE
   What does this app do? (Plain English, one sentence.)

2. WHAT CAN THE USER DO?
   List every action a user can take and what happens when they do it. Use a simple table:

   USER DOES THIS          | APP RESPONDS WITH
   ------------------------|---------------------------
   [action]                | [what happens]

3. THE MAIN FLOW (Step by Step)
   Walk through the most common use case like a story:

   STEP 1: User opens the app. They see: ___
   STEP 2: User does ___. The app: ___
   STEP 3: The app saves/processes ___
   STEP 4: User sees ___

4. WHERE DOES DATA GO?
   Show a simple diagram of how information flows:

   User types something
      ↓
   App receives it
      ↓
   App stores it in ___
      ↓
   App shows it on screen as ___

5. WHAT ARE THE "RULES"?
   List 3-5 rules the app follows.
   Example: "Names can't be empty" or "Data disappears when you refresh"

6. WHAT HAPPENS IN UNUSUAL SITUATIONS?
   Show a table:

   WHAT IF...                     | WHAT HAPPENS
   -------------------------------|---------------------------
   User submits empty form?       | ___
   User refreshes the page?       | ___
   User clicks Submit 100 times?  | ___

Keep the language simple — explain this to someone who has never coded before. Use diagrams made of text characters, not just paragraphs.

Here's my code:
[PASTE YOUR index.html CODE HERE]
```

### When to use this
- Right after your first working version
- Before showing your app to someone else (so you can explain it)
- When a teacher asks "what does your app do?"

---

## Prompt 2: "Walk Me Through the Code" (The Guided Tour)

Use this when you want to actually understand how the code works — what the HTML, CSS, and JavaScript pieces do and how they connect. This prompt gives you safe things to experiment with so you can learn by doing.

```
I built this web app with AI and I want to understand how the code works. I'm a complete beginner — I don't know HTML, CSS, or JavaScript yet. Explain everything using simple language and visual diagrams.

Here's what I need:

PART A: THE LAYOUT (What's on screen)

Show me every visible element in my app like a map:
+-----------------------------------+
|  [header area]                    |
+-----------------------------------+
|  [input area]                     |
|  [buttons]                        |
+-----------------------------------+
|  [results/display area]           |
+-----------------------------------+

List each important element:
ELEMENT               | WHAT IT IS              | WHAT IT DOES
----------------------|-------------------------|------------------
[e.g., text box]      | Where user types        | Collects input
[e.g., Submit button] | Clickable button        | Triggers action

PART B: THE STYLES (How things look)

Show me ONE example of how the CSS controls appearance:
.button {
  background-color: #4CAF50;  ← SAFE TO CHANGE: try "red" or "#FF5733"
  padding: 10px 20px;         ← SAFE TO CHANGE: bigger number = more space
  border-radius: 5px;         ← SAFE TO CHANGE: bigger = rounder corners
}

PART C: THE ACTIONS (What happens when you click things)

For each button or interactive element, show:
WHEN [element] IS CLICKED:
  1. App gets ___
  2. App checks ___
  3. App saves ___
  4. App shows ___

Draw a flowchart for the main action:
User clicks button
      ↓
App reads the text box
      ↓
Is it empty?
  YES → Show error
  NO  → Save data → Update display

PART D: 5 SAFE EXPERIMENTS TO TRY

Give me 5 things I can change in the code that are safe and will teach me something:

1. CHANGE A COLOR
   Find: [exact code to find]
   Change to: [new value]
   What you'll see: [result]

2. CHANGE A SIZE
   Find: [exact code]
   Change to: [new value]
   What you'll see: [result]

3. CHANGE A MESSAGE
   Find: [exact text]
   Change to: [your own text]
   What you'll see: [result]

4. ADD A DEBUG MESSAGE
   Find: [a function]
   Add this line at the top: console.log('This function ran!');
   Open browser console (F12) to see it

5. CHANGE A NUMBER
   Find: [a number in the code]
   Change to: [different number]
   What you'll see: [result]

PART E: THE CHEAT SHEET

Show a translation table for the most common patterns in MY code:

WHAT IT DOES IN PLAIN ENGLISH     | THE CODE THAT DOES IT
----------------------------------|---------------------------
"Find the button on the page"     | document.querySelector('#btn')
"When button is clicked, do ___"  | btn.addEventListener('click', ...)
"Change what's displayed"         | element.textContent = '...'
"Save to a list"                  | array.push(item)
"Check if something is true"      | if (condition) { ... }

Keep everything beginner-friendly. Quote the actual code from MY app (don't use generic examples). Bold the specific code I should look for.

Here's my code:
[PASTE YOUR index.html CODE HERE]
```

### When to use this
- During the "Tweak" phase — understand before you change
- When a teacher wants to learn what the code means
- When you want to try modifying things yourself instead of asking AI

### Bonus: If you know Scratch

If you have Scratch experience, add this line to the prompt before pasting the code:

> Also: I know Scratch programming. When explaining JavaScript concepts, compare them to Scratch blocks. For example, `addEventListener('click', ...)` is like "when this sprite clicked."

This activates Scratch-to-web parallels in the response:

```
SCRATCH BLOCK               | WEB CODE
----------------------------|---------------------------
when green flag clicked      | window.addEventListener('load', ...)
when this sprite clicked     | button.addEventListener('click', ...)
say [Hello]                  | element.textContent = "Hello"
set [var] to [10]            | let myVar = 10
change [var] by [1]          | myVar = myVar + 1
if <condition> then          | if (condition) { ... }
repeat [10]                  | for (let i = 0; i < 10; i++) { ... }
forever                      | setInterval(() => { ... }, 1000)
add [item] to [list]         | list.push(item)
```

---

## Prompt 3: "Help Me Fix or Change This" (The Tutor)

Use this when something is broken, or when you want to add a feature but don't know how. Paste the prompt below, then paste your code and describe your problem.

```
I'm a complete beginner who built this web app with AI. I need help with something specific. Here are your rules:

YOUR ROLE:
- You are a patient tutor, not just a code fixer
- When I describe a problem, help me UNDERSTAND what's wrong — don't just fix it silently
- When I want to add something, walk me through the steps — don't just give me new code
- Celebrate what's already working before addressing what needs fixing
- Keep explanations under 200 words, then ask if I want more detail

HOW TO HELP ME DEBUG:
1. First, tell me what the problem probably is in plain English
2. Then show me exactly where to look (quote the code, don't use line numbers)
3. Tell me to add a console.log() to confirm the problem:
   "Add this line inside your [function name]: console.log('checking:', variableName);"
4. Then show me the fix and explain WHY it fixes the problem

HOW TO HELP ME ADD FEATURES:
1. First, point out a similar pattern already in my code
2. Then break the new feature into 3 simple steps
3. Walk me through each step one at a time
4. After each step, tell me to save and test before continuing

WHAT NOT TO DO:
- Don't rewrite my entire app
- Don't add features I didn't ask for
- Don't use technical jargon without explaining it
- Don't assume I know anything about coding

Here's my code:
[PASTE YOUR index.html CODE HERE]

My question / what I want to change:
[DESCRIBE YOUR PROBLEM OR WHAT YOU WANT TO ADD]
```

### Common things to ask for

**Fixing bugs:**
> The delete button doesn't work. When I click it, nothing happens.

**Adding features:**
> I want to add a "clear all" button that removes everything from the list.

**Changing the look:**
> I want a dark background with light text. Show me exactly what to change.

**Understanding something:**
> What does the `forEach` part of my code do? I see it but don't understand it.

**Saving data:**
> Right now everything disappears when I refresh the page. How do I make it save?

---

## Suggested Workflow

```
Phase 2: GENERATE          → Use the Super Prompt to build your app
                                |
Phase 3: TWEAK              → Use Prompt 1 ("What Did I Build?")
                                |
                             → Use Prompt 2 ("Walk Me Through")
                             → Try the 5 safe experiments
                                |
                             → Use Prompt 3 to fix/add things
                                |
Phase 4: DEPLOY             → Use the Deploy Guide
```

### For Teachers

These prompts work for you too. After a student builds something:
1. Paste the student's code + Prompt 1 → understand what they made
2. Paste the student's code + Prompt 2 → learn the code alongside them
3. Use the "Safe Experiments" as a classroom activity: "Everyone change one color and one number. What happened?"

### For Google Docs

After using any of these prompts, paste Gemini's response into your Google Doc under a new section:

```
## What I Learned About My Code

[Paste Gemini's explanation here]

What surprised me:

What I still don't understand:

Experiments I tried and what happened:
```

---

## Tips

- **Don't paste all 3 prompts at once.** Start with Prompt 1. Move to Prompt 2 when you're ready. Use Prompt 3 when you need specific help.
- **You can use a new Gemini chat for each prompt.** Or stay in the same one — Gemini remembers context within a chat.
- **Teachers: try Prompt 2 on your own first.** The safe experiments are a great way to build your own comfort with code before facilitating.
- **The Scratch table is optional but powerful.** If your students have ANY Scratch experience, add the Scratch line to Prompt 2. The parallels make everything click faster.
</script>


<script type="text/markdown" id="doc-deploy">
# Deploy: Share Your App with the World

Once your `index.html` works locally, use one of these options to share it with a URL anyone can open — no download required.

---

## Option A: Google Sites (Easiest — 5 minutes, no new accounts)

Google Sites lets you embed your HTML app directly in a webpage. Good for: sharing with a class, embedding in a course page, or just getting a quick live URL.

**Limitation**: Some advanced features (like saving data between sessions) may not work inside Google Sites. If your app uses `localStorage`, test it after embedding.

### Steps

1. Go to **[sites.google.com](https://sites.google.com)**
2. Click **"Blank site"** (top left, the `+` button)
3. Give your site a name (top left, click "Untitled Site")
4. In the main editing area, click **Insert** in the right sidebar > **Embed**
5. Click the **"Embed code"** tab
6. Paste your entire `index.html` code into the box
7. Click **Next**, then **Insert**
8. You'll see a preview of your app embedded in the page
9. Click **Publish** (top right) > choose a URL slug (e.g., `sites.google.com/view/my-habit-tracker`) > Publish

**Your app is now live.** Copy the URL and share it.

### Updating

1. Come back to your site at sites.google.com
2. Click the pencil icon to edit
3. Click on the embedded app > click the pencil/edit icon on the embed block
4. Replace the code > Next > Insert
5. Publish again

---

## Option B: GitHub Pages (More Robust — 10–15 minutes, requires GitHub account)

GitHub Pages gives you a permanent URL that's faster and works with all app features including localStorage. Good for: apps you'll keep updating, sharing publicly, or putting on a resume.

**You need**: A free GitHub account — sign up at [github.com](https://github.com)

### Steps (No Terminal Required)

**1. Create a GitHub account** (if you don't have one)
   - Go to [github.com/signup](https://github.com/signup)
   - Use a personal email (not school/work)
   - Choose a username you'll keep — it becomes part of your URL

**2. Create a new repository**
   - Click the **`+`** in the top-right > **"New repository"**
   - Repository name: something short and lowercase, no spaces (e.g., `habit-tracker` or `my-app`)
   - Set to **Public**
   - Check **"Add a README file"**
   - Click **"Create repository"**

**3. Upload your HTML file**
   - In your new repository, click **"Add file"** > **"Upload files"**
   - Drag your `index.html` file into the upload area (or click "choose your files")
   - Scroll down to "Commit changes"
   - Leave the message as-is or type something like "Add app"
   - Click **"Commit changes"**

**4. Enable GitHub Pages**
   - Click the **"Settings"** tab (top of the repo page)
   - In the left sidebar, scroll down and click **"Pages"**
   - Under "Source", click the dropdown that says "None" and select **"Deploy from a branch"**
   - Under "Branch", select **"main"** and leave the folder as **"/ (root)"**
   - Click **"Save"**

**5. Wait, then visit your site**
   - Wait about **2 minutes** for the first deployment
   - Refresh the Settings > Pages page — you'll see a green banner: "Your site is live at..."
   - Your URL is: `https://YOUR-USERNAME.github.io/YOUR-REPO-NAME/`
   - Click it to open your live app

### Updating Your App on GitHub Pages

When you have a new version of your `index.html`:
1. Go to your repository on github.com
2. Click on `index.html` in the file list
3. Click the **pencil icon** (Edit this file) in the top right
4. Select all the text and delete it
5. Paste your new code
6. Click **"Commit changes"** > "Commit changes" again
7. Wait 1–2 minutes, then hard-refresh the page: **Ctrl+Shift+R** (Windows) or **Cmd+Shift+R** (Mac)

---

## Option C: Send the File Directly (Simplest of All)

If you just want to share with specific people and don't need a URL:

1. Email them your `index.html` as an attachment
2. They download it, double-click it, and it works in their browser
3. No account, no hosting — it's just a file

Works great for: classroom demos, sharing with a teacher, testing with a friend.

## Troubleshooting

### Google Sites: "The app looks blank"
- Make sure you pasted the FULL code including `<!DOCTYPE html>` at the start and `</html>` at the end
- Try a hard refresh: Ctrl+Shift+R / Cmd+Shift+R
- Some apps won't work inside Sites — try GitHub Pages instead

### GitHub Pages: "404 Not Found"
- Make sure the file is named exactly `index.html` (lowercase, no spaces)
- Wait 3 minutes — Pages takes time on the first deploy
- Check Settings > Pages — is it showing the green banner yet?

### GitHub Pages: "Page loads but the app doesn't work"
- Your code may be referencing external files — with this super prompt, everything should be in one file
- Open the browser console (F12 > Console tab) and look for red errors

### Either: "I updated the code but nothing changed"
- Do a hard refresh: **Ctrl+Shift+R** (Windows) / **Cmd+Shift+R** (Mac)
- GitHub Pages takes 1–3 minutes to redeploy after a commit

let currentDocId = null;


// ═══════════════════════════════════════════════════════════════════════════
// BUILD NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════

function buildNav() {
  const nav = document.getElementById('nav-items');
  let lastGroup = null;

  DOCS.forEach(doc => {
    // Section label
    if (doc.group && doc.group !== lastGroup) {
      if (doc.separator && lastGroup !== null) {
        const sep = document.createElement('div');
        sep.className = 'nav-separator';
        nav.appendChild(sep);
      }
      const label = document.createElement('div');
      label.className = 'nav-section-label';
      label.textContent = doc.group;
      nav.appendChild(label);
      lastGroup = doc.group;
    }

    const ph = PHASE[doc.phase] || PHASE.facilitator;

    const item = document.createElement('div');
    item.className = 'nav-item';
    item.dataset.docId = doc.id;
    item.setAttribute('role', 'button');
    item.setAttribute('tabindex', '0');
    item.innerHTML =
      '<div class="nav-item-top">' +
        '<span class="nav-emoji">' + doc.emoji + '</span>' +
        '<span class="nav-title">' + doc.title + '</span>' +
      '</div>' +
      '<span class="nav-badge" style="background:' + ph.bg + ';color:' + ph.text + '">' + ph.label + '</span>';

    item.addEventListener('click', () => openDoc(doc.id));
    item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openDoc(doc.id); });
    nav.appendChild(item);
  });
}


// ═══════════════════════════════════════════════════════════════════════════
// OPEN DOC
// ═══════════════════════════════════════════════════════════════════════════

function openDoc(docId) {
  currentDocId = docId;
  const doc = DOCS.find(d => d.id === docId);
  if (!doc) return;
  const ph = PHASE[doc.phase] || PHASE.facilitator;

  // Raw content from <script type="text/markdown"> tag
  const rawEl = document.getElementById('doc-' + docId);
  let rawContent = rawEl ? rawEl.textContent : '(Content not found.)';

  // Strip leading H1 — title is already shown in the doc-header
  rawContent = rawContent.trim().replace(/^#[^\n]*\n+/, '');

  // Update nav active states + left border color
  document.querySelectorAll('.nav-item').forEach(item => {
    const isActive = item.dataset.docId === docId;
    item.classList.toggle('active', isActive);
    item.style.borderLeftColor = isActive ? ph.accent : 'transparent';
  });

  // Render doc-header
  document.getElementById('doc-header').innerHTML =
    '<div id="doc-header-inner">' +
      '<div class="doc-title-row">' +
        '<span class="doc-header-emoji">' + doc.emoji + '</span>' +
        '<div>' +
          '<div class="doc-title">' + doc.title + '</div>' +
          '<div class="doc-badges">' +
            '<span class="doc-badge audience">' + doc.audience + '</span>' +
            '<span class="doc-badge" style="background:' + ph.bg + ';color:' + ph.text + '">' + ph.label + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="doc-desc">' + doc.description + '</div>' +
    '</div>';

  // Render doc-body
  const body = document.getElementById('doc-body');
  try {
    if (typeof marked !== 'undefined') {
      marked.setOptions({ gfm: true, breaks: false });
      body.innerHTML = marked.parse(rawContent);
    } else {
      // Fallback: show raw markdown preformatted
      body.innerHTML = '<pre style="white-space:pre-wrap;font-size:14px;line-height:1.7">' + escapeHtml(rawContent) + '</pre>';
    }
  } catch (err) {
    body.innerHTML = '<pre style="white-space:pre-wrap;font-size:14px;line-height:1.7">' + escapeHtml(rawContent) + '</pre>';
  }

  postProcess(body);

  // Scroll to top of content
  window.scrollTo(0, 0);
  document.getElementById('content').scrollTo(0, 0);

  // Close mobile sidebar
  closeSidebar();
}


// ═══════════════════════════════════════════════════════════════════════════
// POST-RENDER PROCESSING
// ═══════════════════════════════════════════════════════════════════════════

function postProcess(container) {
  // 1. Syntax highlight code blocks
  if (typeof hljs !== 'undefined') {
    container.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  }

  // 2. Inject copy button into every <pre>
  container.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.setAttribute('aria-label', 'Copy code');
    btn.addEventListener('click', () => copyText(code.textContent, btn));
    pre.appendChild(btn);
  });

  // 3. Open external links in new tab
  container.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('http') || href.startsWith('//')) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    }
  });

  // 4. Classify blockquotes by first keyword
  container.querySelectorAll('blockquote').forEach(bq => {
    const text = bq.textContent.trim().toLowerCase();
    if (text.startsWith('warning') || text.startsWith('important')) {
      bq.classList.add('warning');
    } else if (text.startsWith('note')) {
      bq.classList.add('note');
    } else if (text.startsWith('tip')) {
      bq.classList.add('tip');
    }
  });

  // 5. Add anchor IDs to h2/h3 for smooth-scroll
  container.querySelectorAll('h2, h3').forEach(heading => {
    const id = heading.textContent
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
    heading.id = id;
  });

  // 6. Enable task-list checkboxes (marked.js renders them as disabled)
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.removeAttribute('disabled');
  });
}


// ═══════════════════════════════════════════════════════════════════════════
// CLIPBOARD
// ═══════════════════════════════════════════════════════════════════════════

function copyText(text, btn) {
  const done = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  };
  const fail = () => { btn.textContent = 'Error'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => execCopy(text, done, fail));
  } else {
    execCopy(text, done, fail);
  }
}

function execCopy(text, done, fail) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    done();
  } catch {
    fail();
  }
  document.body.removeChild(ta);
}


// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}


// ═══════════════════════════════════════════════════════════════════════════
// MOBILE SIDEBAR
// ═══════════════════════════════════════════════════════════════════════════

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
